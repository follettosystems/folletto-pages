<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pago cancelado</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fef2f2;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.card{background:#fff;border-radius:16px;padding:40px 32px;text-align:center;max-width:400px;width:100%;box-shadow:0 4px 24px rgba(0,0,0,.08);}
.icon{font-size:56px;margin-bottom:16px;}
h1{font-size:24px;font-weight:700;color:#dc2626;margin-bottom:8px;}
p{font-size:15px;color:#6b7280;line-height:1.6;}
.sub{margin-top:24px;font-size:13px;color:#9ca3af;}
</style>
</head>
<body>
<div class="card">
  <div class="icon">❌</div>
  <h1>Pago cancelado</h1>
  <p>No se ha procesado ningún cobro.<br>Si tienes algún problema escríbenos por WhatsApp.</p>
  <div class="sub">Puedes cerrar esta ventana.</div>
</div>
</body>
</html>
